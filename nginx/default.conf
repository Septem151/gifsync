server {
    listen 443 ssl;
    server_name dance.gifsync.io;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # GIF uploads are stored as bytea in Postgres; nginx default (1M) is too small.
    client_max_body_size 25M;

    location / {
        proxy_pass http://web:8443;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # gifsicle processing happens synchronously in-request; allow generous timeouts.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
